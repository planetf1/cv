name: Build and Commit PDF CV

on:
  push:
    branches:
      - main
    paths:
      - 'README.md' # Only run when the markdown file changes

jobs:
  generate_pdf:
    runs-on: ubuntu-latest
    # Securely scope permissions so the bot can commit the new file
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Generate PDF from Markdown
        # The --no-sandbox flag is required for Chromium to run in a headless Ubuntu runner
        run: md-to-pdf README.md --launch-options '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }'

      - name: Commit and Push PDF
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Rename output to match the download link in your README
          if [ -f "README.pdf" ]; then
            git add README.pdf
          fi
          
          # Check if the PDF actually changed to avoid failing on empty commits
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate updated PDF CV"
            git push
          fi
