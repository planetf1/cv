name: Build and Commit PDF CV

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  generate_pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Generate PDF from Markdown
        run: md-to-pdf README.md --launch-options '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }'

      - name: Commit and Push PDF
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.pdf
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate updated PDF CV" && git push)
